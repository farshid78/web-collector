name: Scraper

on:
  workflow_dispatch:

  # اجرای خودکار هر 10 دقیقه
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: scraper-main
  cancel-in-progress: false

jobs:
  scrape:
    name: Telegram Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TZ: UTC

    steps:

      # ==================================================
      # CHECKOUT
      # ==================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # ==================================================
      # INFO
      # ==================================================
      - name: Workflow Info
        run: |
          echo "================================="
          echo "🕷️ SCRAPER STARTED"
          echo "UTC: $(date -u)"
          echo "EVENT: ${{ github.event_name }}"
          echo "RUN ID: ${{ github.run_id }}"
          echo "================================="

      # ==================================================
      # PYTHON
      # ==================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ==================================================
      # INSTALL DEPENDENCIES
      # ==================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            telethon \
            python-dotenv \
            requests \
            PySocks

      # ==================================================
      # VALIDATE SECRETS
      # ==================================================
      - name: Validate secrets
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |

          echo "🔍 validating secrets"

          if [ -z "$API_ID" ]; then
            echo "❌ API_ID missing"
            exit 1
          fi

          if [ -z "$API_HASH" ]; then
            echo "❌ API_HASH missing"
            exit 1
          fi

          if [ -z "$SESSION_STRING" ]; then
            echo "❌ SESSION_STRING missing"
            exit 1
          fi

          echo "✅ secrets valid"

      # ==================================================
      # PREPARE DIRECTORIES
      # ==================================================
      - name: Prepare folders
        run: |
          mkdir -p output
          mkdir -p state
          mkdir -p scraper
          mkdir -p logs

          echo "📁 folders prepared"

      # ==================================================
      # VERIFY PROJECT FILES
      # ==================================================
      - name: Verify project files
        run: |

          echo "Checking project files..."

          if [ ! -f "scraper/scraper.py" ]; then
            echo "❌ scraper.py missing"
            exit 1
          fi

          if [ ! -f "scraper/channels.json" ]; then
            echo "❌ channels.json missing"
            exit 1
          fi

          echo "Channels:"
          cat scraper/channels.json || true

          echo "✅ verification complete"

      # ==================================================
      # RUN SCRAPER
      # ==================================================
      - name: Run scraper
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |

          echo "================================="
          echo "🚀 STARTING SCRAPER"
          echo "================================="

          SUCCESS=0

          for i in 1 2 3
          do

            echo ""
            echo "SCRAPER ATTEMPT: $i"
            echo ""

            if timeout 25m python scraper/scraper.py
            then
              SUCCESS=1
              echo "✅ scraper success"
              break
            fi

            echo "⚠️ scraper crashed"

            sleep 20

          done

          if [ "$SUCCESS" -ne 1 ]
          then
            echo "❌ scraper failed"
            exit 1
          fi

      # ==================================================
      # SHOW OUTPUT
      # ==================================================
      - name: Show output files
        run: |

          echo "================================="
          echo "📁 OUTPUT FILES"
          echo "================================="

          ls -lah output || true

      # ==================================================
      # COMMIT OUTPUT + STATE
      # ==================================================
      - name: Commit scraper output
        run: |

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            output/ \
            state/ \
            scraper/channels.json \
            || true

          if git diff --cached --quiet
          then
            echo "ℹ️ no changes"

          else

            git commit -m \
            "🕷️ scraper update $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            || true

            PUSH_SUCCESS=0

            for i in 1 2 3
            do

              echo "push attempt $i"

              git pull \
                --rebase \
                origin main \
                || true

              if git push
              then
                PUSH_SUCCESS=1
                echo "✅ push success"
                break
              fi

              sleep 10

            done

            if [ "$PUSH_SUCCESS" -ne 1 ]
            then
              echo "❌ push failed"
              exit 1
            fi
          fi

      # ==================================================
      # SUMMARY
      # ==================================================
      - name: Summary
        if: always()
        run: |
          echo "================================="
          echo "🏁 SCRAPER FINISHED"
          echo "UTC: $(date -u)"
          echo "STATUS: DONE"
          echo "================================="