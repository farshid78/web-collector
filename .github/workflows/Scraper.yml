name: Scraper

on:
  workflow_dispatch:

  schedule:
    # هر 10 دقیقه
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: scraper-main
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape Telegram Channels
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TZ: UTC

    steps:

      # ==========================================
      # CHECKOUT
      # ==========================================

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      # ==========================================
      # INFO
      # ==========================================

      - name: Workflow info
        run: |
          echo "================================="
          echo "🕷️ SCRAPER STARTED"
          echo "UTC: $(date -u)"
          echo "EVENT: ${{ github.event_name }}"
          echo "RUN ID: ${{ github.run_id }}"
          echo "================================="

      # ==========================================
      # PYTHON
      # ==========================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ==========================================
      # INSTALL
      # ==========================================

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            telethon \
            python-dotenv \
            requests \
            PySocks

      # ==========================================
      # VALIDATE SECRETS
      # ==========================================

      - name: Validate secrets
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |

          echo "🔍 checking secrets"

          if [ -z "$API_ID" ]; then
            echo "❌ API_ID missing"
            exit 1
          fi

          if [ -z "$API_HASH" ]; then
            echo "❌ API_HASH missing"
            exit 1
          fi

          if [ -z "$SESSION_STRING" ]; then
            echo "❌ SESSION_STRING missing"
            exit 1
          fi

          echo "✅ secrets ok"

      # ==========================================
      # PREPARE DIRS
      # ==========================================

      - name: Prepare folders
        run: |
          mkdir -p output
          mkdir -p state
          mkdir -p scraper

          echo "📁 folders ready"

      # ==========================================
      # VERIFY FILES
      # ==========================================

      - name: Verify project files
        run: |

          echo "checking files"

          if [ ! -f "scraper/scraper.py" ]; then
            echo "❌ scraper/scraper.py missing"
            exit 1
          fi

          if [ ! -f "scraper/channels.json" ]; then
            echo "❌ scraper/channels.json missing"
            exit 1
          fi

          echo "✅ files ok"

      # ==========================================
      # RUN SCRAPER
      # ==========================================

      - name: Run scraper
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |

          echo "================================="
          echo "🕷️ STARTING SCRAPER"
          echo "================================="

          SUCCESS=0

          for i in 1 2 3
          do

            echo "SCRAPER ATTEMPT: $i"

            if timeout 15m python scraper/scraper.py
            then
              SUCCESS=1
              echo "✅ scraper success"
              break
            fi

            echo "⚠️ scraper failed"

            sleep 20

          done

          if [ "$SUCCESS" -ne 1 ]
          then
            echo "❌ scraper failed"
            exit 1
          fi

      # ==========================================
      # SHOW OUTPUT
      # ==========================================

      - name: Show output files
        run: |

          echo "================================="
          echo "📁 OUTPUT FILES"
          echo "================================="

          ls -lah output || true

      # ==========================================
      # COMMIT OUTPUT + STATE
      # ==========================================

      - name: Commit changes
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add \
            output/ \
            state/ \
            scraper/channels.json \
            || true

          if git diff --cached --quiet
          then
            echo "ℹ️ no changes"

          else

            git commit -m \
            "scraper update $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            || true

            PUSH_SUCCESS=0

            for i in 1 2 3
            do

              echo "push attempt $i"

              git pull --rebase origin main || true

              if git push
              then
                PUSH_SUCCESS=1
                echo "✅ push success"
                break
              fi

              sleep 15

            done

            if [ "$PUSH_SUCCESS" -ne 1 ]
            then
              echo "❌ push failed"
              exit 1
            fi

          fi

      # ==========================================
      # SUMMARY
      # ==========================================

      - name: Summary
        if: always()
        run: |
          echo "================================="
          echo "🏁 SCRAPER FINISHED"
          echo "UTC: $(date -u)"
          echo "================================="