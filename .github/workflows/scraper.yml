name: Scraper Pipeline

on:
  schedule:
    - cron: "*/05 * * * *"   # اجرای هر 15 دقیقه
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repo
      # -------------------------
      - name: Checkout repo
        uses: actions/checkout@v3

      # -------------------------
      # Python Setup
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Run scraper
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          MODE: USER
        run: |
          cd scraper
          python scraper.py

      # -------------------------
      # Go Setup
      # -------------------------
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"

      - name: Run processor
        run: |
          cd processor
          go run main.go

      # -------------------------
      # Send results to ALL users
      # -------------------------
      - name: Send results to all users
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE

          if [ ! -f users.txt ]; then
            echo "users.txt not found. No users to send files to."
            exit 0
          fi

          echo "Sending files to all users..."

          while read chat_id; do
            echo "Sending to $chat_id"

            curl -s -F chat_id=$chat_id \
                 -F document=@configs.txt \
                 https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument

            curl -s -F chat_id=$chat_id \
                 -F document=@results.txt \
                 https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument

          done < users.txt

      # -------------------------
      # Commit results back to repo (only if changed)
      # -------------------------
      - name: Commit results
        run: |
          cd $GITHUB_WORKSPACE

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add -A

          # اگر تغییری نبود → commit نکن
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi

          git commit -m "Auto-update: configs, results, users"
          git push
