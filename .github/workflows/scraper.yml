name: Scraper Pipeline

on:
  schedule:
    - cron: "*/15 * * * *"   # هر 15 دقیقه
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Run scraper
        env:
          API_ID: ${{ secrets.API_ID }}                 # اینجا API_ID را در Secrets تعریف کن
          API_HASH: ${{ secrets.API_HASH }}             # اینجا API_HASH را در Secrets تعریف کن
          SESSION_STRING: ${{ secrets.SESSION_STRING }} # اینجا SESSION_STRING را در Secrets تعریف کن
          MODE: USER
        run: |
          cd scraper
          python scraper.py

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"

      - name: Run processor
        run: |
          cd processor
          go run main.go

      - name: Send results to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}   # اینجا توکن ربات را در Secrets تعریف کن
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}       # اینجا chat_id مقصد را در Secrets تعریف کن
        run: |
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F document=@configs.txt \
               https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument
          curl -F chat_id=$TELEGRAM_CHAT_ID \
               -F document=@results.txt \
               https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add configs.txt results.txt || echo "nothing to add"
          git commit -m "Update configs and results" || echo "nothing to commit"
          git push || echo "nothing to push"
