name: Full Auto Scraper + Telethon Sender

on:
  schedule:
    - cron: "*/5 * * * *"   # هر ۵ دقیقه
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout repo
      # -------------------------
      - name: Checkout repo
        uses: actions/checkout@v3

      # -------------------------
      # Python Setup
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install telethon python-dotenv requests beautifulsoup4 PySocks

      # -------------------------
      # Run scraper
      # -------------------------
      - name: Run scraper
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          MODE: USER
        run: |
          python scraper/scraper.py

      # -------------------------
      # Go Setup
      # -------------------------
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"

      - name: Run processor
        run: |
          cd processor
          go run main.go

      # -------------------------
      # Update users.txt from getUpdates
      # -------------------------
      - name: Update users list from Telegram API
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "Updating users.txt from getUpdates..."

          curl -s "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/getUpdates" > updates.json

          # استخراج chat_id ها
          cat updates.json | jq -r '.result[].message.chat.id' | sort -u > new_users.txt

          # اگر users.txt وجود داشت → ادغام کن
          if [ -f users.txt ]; then
            cat users.txt >> new_users.txt
          fi

          # حذف تکراری‌ها
          sort -u new_users.txt > users.txt

          echo "Updated users:"
          cat users.txt

      # -------------------------
      # Commit updated files
      # -------------------------
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi

          git commit -m "Auto-update: configs, results, users"
          git push

      # -------------------------
      # Run bot.py (Telethon SEND mode)
      # -------------------------
      - name: Run bot sender
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MODE: SEND
        run: |
          python bot.py
