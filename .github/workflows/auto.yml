name: Full Auto Scraper + Auto Sender

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Debug folder structure
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== FILE TREE ==="
          ls -R .

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install telethon python-dotenv requests beautifulsoup4 PySocks

      - name: Run scraper (with full path debug)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |
          echo "=== Checking scraper path ==="
          if [ -f "scraper/scraper.py" ]; then
            echo "FOUND: scraper/scraper.py"
            echo "Absolute path:"
            realpath scraper/scraper.py
          else
            echo "❌ ERROR: scraper/scraper.py NOT FOUND"
            exit 1
          fi

          echo "=== Running scraper ==="
          python scraper/scraper.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "Auto-update: configs"
            git push
          fi

      - name: Run bot (with full path debug)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "=== Checking bot.py path ==="
          if [ -f "bot.py" ]; then
            echo "FOUND: bot.py"
            echo "Absolute path:"
            realpath bot.py
          else
            echo "❌ ERROR: bot.py NOT FOUND"
            exit 1
          fi

          echo "=== Running bot ==="
          python bot.py
