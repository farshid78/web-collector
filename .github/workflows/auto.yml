name: Full Auto Scraper + Auto Sender

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install telethon python-dotenv requests beautifulsoup4 PySocks

      - name: Run scraper
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |
          python scraper/scraper.py

      - name: Update users list
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "Updating users.txt from getUpdates..."
          curl -s "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/getUpdates" > updates.json
          cat updates.json | jq -r '.result[].message.chat.id' | sort -u > new_users.txt
          if [ -f users.txt ]; then
            cat users.txt >> new_users.txt
          fi
          sort -u new_users.txt > users.txt
          echo "Updated users:"
          cat users.txt

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected."
          else:
            git commit -m "Auto-update: configs, users"
            git push
          fi

      - name: Send file to all users
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          MODE: SEND
        run: |
          python bot.py
