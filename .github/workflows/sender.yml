name: Sender Bot

on:
  workflow_dispatch:

  # اجرای خودکار بعد از پایان Scraper
  workflow_run:
    workflows:
      - Scraper
    types:
      - completed

  # بکاپ زمان‌بندی
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: sender-bot-main
  cancel-in-progress: false

jobs:
  send:
    name: Telegram Sender Bot
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # فقط اگر:
    # 1) دستی ران شد
    # 2) schedule بود
    # 3) scraper موفق تمام شد
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      )

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TZ: UTC

    steps:

      # ==================================================
      # CHECKOUT
      # ==================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # ==================================================
      # INFO
      # ==================================================
      - name: Workflow Info
        run: |
          echo "================================="
          echo "🤖 TELEGRAM BOT STARTED"
          echo "UTC: $(date -u)"
          echo "EVENT: ${{ github.event_name }}"
          echo "RUN ID: ${{ github.run_id }}"
          echo "================================="

      # ==================================================
      # PYTHON
      # ==================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ==================================================
      # INSTALL DEPENDENCIES
      # ==================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            telethon \
            python-dotenv \
            requests \
            PySocks

      # ==================================================
      # VALIDATE SECRETS
      # ==================================================
      - name: Validate secrets
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |

          echo "🔍 validating secrets"

          if [ -z "$API_ID" ]; then
            echo "❌ API_ID missing"
            exit 1
          fi

          if [ -z "$API_HASH" ]; then
            echo "❌ API_HASH missing"
            exit 1
          fi

          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ TELEGRAM_BOT_TOKEN missing"
            exit 1
          fi

          echo "✅ secrets valid"

      # ==================================================
      # PREPARE DIRECTORIES
      # ==================================================
      - name: Prepare folders
        run: |
          mkdir -p output
          mkdir -p state
          mkdir -p logs

          echo "📁 folders prepared"

      # ==================================================
      # VERIFY FILES
      # ==================================================
      - name: Verify bot files
        run: |

          echo "Checking bot files..."

          if [ ! -f "bot.py" ]; then
            echo "❌ bot.py missing"
            exit 1
          fi

          echo "Output directory:"
          ls -lah output || true

          echo "✅ verification complete"

      # ==================================================
      # RUN BOT
      # ==================================================
      - name: Run Telegram Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |

          echo "================================="
          echo "🚀 STARTING TELEGRAM BOT"
          echo "================================="

          SUCCESS=0

          for i in 1 2 3
          do

            echo ""
            echo "BOT ATTEMPT: $i"
            echo ""

            if timeout 20m python bot.py
            then
              SUCCESS=1
              echo "✅ bot success"
              break
            fi

            echo "⚠️ bot crashed"

            sleep 15

          done

          if [ "$SUCCESS" -ne 1 ]
          then
            echo "❌ bot failed"
            exit 1
          fi

      # ==================================================
      # COMMIT STATE
      # ==================================================
      - name: Commit bot state
        run: |

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            users.json \
            state/ \
            logs/ \
            || true

          if git diff --cached --quiet
          then
            echo "ℹ️ no state changes"

          else

            git commit -m \
            "🤖 bot state update $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            || true

            PUSH_SUCCESS=0

            for i in 1 2 3
            do

              echo "push attempt $i"

              git pull \
                --rebase \
                origin main \
                || true

              if git push
              then
                PUSH_SUCCESS=1
                echo "✅ push success"
                break
              fi

              sleep 10

            done

            if [ "$PUSH_SUCCESS" -ne 1 ]
            then
              echo "❌ push failed"
              exit 1
            fi
          fi

      # ==================================================
      # SUMMARY
      # ==================================================
      - name: Summary
        if: always()
        run: |
          echo "================================="
          echo "🏁 TELEGRAM BOT FINISHED"
          echo "UTC: $(date -u)"
          echo "STATUS: DONE"
          echo "================================="