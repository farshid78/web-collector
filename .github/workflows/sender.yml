name: Sender Bot

on:
  workflow_dispatch:

  schedule:
    # دو دقیقه بعد از scraper
    - cron: "2,12,22,32,42,52 * * * *"

permissions:
  contents: write

concurrency:
  group: sender-bot-main
  cancel-in-progress: false

jobs:
  send:
    name: Telegram Sender Bot
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TZ: UTC

    steps:

      # ==================================================
      # CHECKOUT
      # ==================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # ==================================================
      # INFO
      # ==================================================
      - name: Workflow Info
        run: |
          echo "================================="
          echo "🤖 TELEGRAM BOT STARTED"
          echo "UTC: $(date -u)"
          echo "EVENT: ${{ github.event_name }}"
          echo "RUN ID: ${{ github.run_id }}"
          echo "================================="

      # ==================================================
      # PYTHON
      # ==================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ==================================================
      # INSTALL DEPENDENCIES
      # ==================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            telethon \
            python-dotenv \
            requests \
            PySocks

      # ==================================================
      # VALIDATE SECRETS
      # ==================================================
      - name: Validate secrets
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |

          [ -z "$API_ID" ] && echo "❌ API_ID missing" && exit 1
          [ -z "$API_HASH" ] && echo "❌ API_HASH missing" && exit 1
          [ -z "$TELEGRAM_BOT_TOKEN" ] && echo "❌ TELEGRAM_BOT_TOKEN missing" && exit 1

          echo "✅ secrets valid"

      # ==================================================
      # PREPARE
      # ==================================================
      - name: Prepare folders
        run: |
          mkdir -p output state logs

      # ==================================================
      # VERIFY FILES
      # ==================================================
      - name: Verify bot files
        run: |
          test -f bot.py || (
            echo "❌ bot.py missing"
            exit 1
          )

      # ==================================================
      # RUN BOT
      # ==================================================
      - name: Run Telegram Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |

          SUCCESS=0

          for i in 1 2 3
          do
            echo "BOT ATTEMPT: $i"

            if timeout 20m python bot.py
            then
              SUCCESS=1
              echo "✅ bot success"
              break
            fi

            echo "⚠️ bot crashed"

            BACKOFF=$((i * 15))
            sleep $BACKOFF
          done

          if [ "$SUCCESS" -ne 1 ]
          then
            echo "❌ bot failed"
            exit 1
          fi

      # ==================================================
      # COMMIT STATE
      # ==================================================
      - name: Commit bot state
        run: |

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add users.json state/ logs/ || true

          if git diff --cached --quiet
          then
            echo "ℹ️ no changes"
            exit 0
          fi

          git commit -m \
          "🤖 bot update $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
          || true

          PUSH_SUCCESS=0

          for i in 1 2 3
          do
            git pull --rebase origin main || true

            if git push
            then
              PUSH_SUCCESS=1
              break
            fi

            BACKOFF=$((i * 15))
            sleep $BACKOFF
          done

          if [ "$PUSH_SUCCESS" -ne 1 ]
          then
            echo "❌ push failed"
            exit 1
          fi

      # ==================================================
      # SUMMARY
      # ==================================================
      - name: Summary
        if: always()
        run: |
          echo "================================="
          echo "🏁 TELEGRAM BOT FINISHED"
          echo "UTC: $(date -u)"
          echo "================================="