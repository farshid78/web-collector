name: Collector

on:
  schedule:
    - cron: "*/10 * * * *"   # هر ۱۰ دقیقه
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Run collector
        run: go run .

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add results.txt
          git commit -m "update results" || echo "no changes"
          git push
