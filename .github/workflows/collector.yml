name: Run Collector

on:
  schedule:
    - cron: "*/15 * * * *"   # هر ۱۵ دقیقه
  workflow_dispatch:         # اجرای دستی

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: go mod tidy

      - name: Run collector
        run: go run .
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update" || echo "No changes to commit"

      - name: Push changes
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git push https://$PAT@github.com/farshid78/web-collector.git HEAD:main
